<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Globe outline -->
  <circle cx="32" cy="32" r="18" stroke="url(#g)" stroke-width="2"/>

  <!-- Latitude lines -->
  <path d="M 16 25 Q 32 29, 48 25" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
  <path d="M 14 32 Q 32 36, 50 32" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
  <path d="M 16 39 Q 32 43, 48 39" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>

  <!-- Longitude line -->
  <path d="M 32 14 L 32 50" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>

  <!-- Bridge arch -->
  <path d="M 16 50 C 16 24, 24 14, 32 14 C 40 14, 48 24, 48 50"
        stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Bridge deck -->
  <path d="M 22 50 L 42 50" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Pillars -->
  <line x1="28" y1="42" x2="28" y2="50" stroke="url(#g)" stroke-width="2" opacity="0.7"/>
  <line x1="36" y1="42" x2="36" y2="50" stroke="url(#g)" stroke-width="2" opacity="0.7"/>

  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
</svg>
